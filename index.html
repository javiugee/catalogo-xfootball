    <title>XFOOTBALL — Catálogo</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap");

      :root {
        --bg: #0d0e10;
        --surface: #141618;
        --border: #2a2d33;
        --accent: #e8f54a;
        --text: #f0f0f0;
        --muted: #6b7280;
        --whatsapp: #25d366;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* HEADER */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        height: 70px;
        background: rgba(13, 14, 16, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-family: "Bebas Neue";
        font-size: 2rem;
        color: var(--accent);
        text-decoration: none;
        letter-spacing: 1px;
      }
      .logo span {
        color: #fff;
      }

      .search-bar input {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.6rem 1rem;
        color: #fff;
        width: 300px;
        outline: none;
        transition: 0.3s;
      }
      .search-bar input:focus {
        border-color: var(--accent);
        width: 350px;
      }

      /* LAYOUT PRINCIPAL */
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: calc(100vh - 70px);
      }

      /* SIDEBAR (PC) */
      aside {
        border-right: 1px solid var(--border);
        padding: 2rem 0;
        height: calc(100vh - 70px);
        position: sticky;
        top: 70px;
      }
      .sidebar-label {
        font-family: "DM Mono";
        font-size: 0.7rem;
        color: var(--muted);
        padding: 0 1.5rem;
        margin-bottom: 1rem;
        text-transform: uppercase;
      }

      .cat-btn {
        width: 100%;
        padding: 1rem 1.5rem;
        background: none;
        border: none;
        color: var(--muted);
        text-align: left;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1rem;
        font-weight: 500;
      }
      .cat-btn:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.03);
      }
      .cat-btn.active {
        color: var(--accent);
        background: var(--surface);
        border-left: 4px solid var(--accent);
      }

      /* CONTENIDO */
      main {
        padding: 2rem;
      }
      .section {
        display: none;
      }
      .section.visible {
        display: block;
        animation: fadeIn 0.4s ease forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 2rem;
      }

      /* TARJETAS */
      .product-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        transition: 0.3s;
      }
      .product-card:hover {
        transform: translateY(-8px);
        border-color: var(--accent);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .product-card .card-img {
        height: 350px !important; /* Puedes ajustar este valor si las quieres más altas o bajas */
        object-fit: cover !important;
        width: 100% !important;
      }

      .product-card .card-title {
        min-height: 3em; /* Ajusta según el tamaño de tu fuente */
      }

      .card-img {
        position: relative;
        cursor: pointer;
      }

      /* Un icono de cámara pequeño o contador de fotos en la esquina */
      .photo-tag {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: bold;
        pointer-events: none; /* Para que no interfiera con el clic de la imagen */
      }

      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .card-body {
        padding: 1.2rem;
      }
      .card-title {
        font-weight: 700;
        margin-bottom: 1.2rem;
        height: 2.6em;
        overflow: hidden;
        font-size: 1rem;
        line-height: 1.3;
      }

      /* Dentro de tu etiqueta <style> */

      .btn-group {
        display: block; /* Cambiamos flex por block para que ocupe todo el ancho */
        width: 100%;
      }

      .btn-wa {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--whatsapp);
        color: #000;
        text-decoration: none;
        padding: 12px 5px; /* Un poco más de relleno vertical */
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.8rem;
        width: 100%; /* Botón al 100% del ancho de la tarjeta */
        transition: transform 0.2s;
      }

      .btn-wa:active {
        transform: scale(0.96); /* Efecto de pulsación en el móvil */
      }

      /* Eliminamos cualquier rastro del botón de fotos si quedara algo */
      .btn-photos {
        display: none !important;
      }

      /* Tamaño del logo de WhatsApp */
      .btn-wa svg {
        width: 18px;
        height: 18px;
        fill: currentColor; /* Hará que el logo sea negro como el texto */
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(15px);
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
      }
      .modal-content {
        max-width: 800px;
        width: 95%;
        margin: 20px 0;
        border-radius: 12px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      }
      .close-modal {
        position: fixed;
        top: 20px;
        right: 30px;
        color: var(--accent);
        font-size: 3.5rem;
        cursor: pointer;
        z-index: 1001;
        line-height: 1;
      }

      .dev-banner {
        background: #1a1c1e; /* Un gris un poco más claro que el fondo */
        color: var(
          --accent
        ); /* El color verde lima/amarillo para que resalte */
        text-align: center;
        padding: 8px 10px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
      }

      /* Ajuste para que el menú de categorías no se solape con el nuevo banner */
      header {
        top: 0;
      }
      aside,
      nav {
        top: 70px; /* Si ves que al hacer scroll se descuadra, ajusta este valor */
      }

      /* RESPONSIVE (MÓVIL) */
      @media (max-width: 850px) {
        header {
          padding: 0 1rem;
        }
        .search-bar input {
          width: 150px;
        }
        .search-bar input:focus {
          width: 180px;
        }
        .layout {
          grid-template-columns: 1fr;
        }
        aside {
          display: flex;
          height: auto;
          position: static;
          overflow-x: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 1rem;
          scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        aside::-webkit-scrollbar {
          display: none;
        } /* Oculta scroll en Chrome/Safari */
        .sidebar-label {
          display: none;
        }
        .cat-btn {
          border: 1px solid var(--border);
          border-radius: 12px;
          margin-right: 0.6rem;
          width: auto;
          padding: 0.6rem 1.2rem;
          white-space: nowrap;
        }
        .cat-btn.active {
          border-color: var(--accent);
          border-left-width: 1px;
        }
        main {
          padding: 1rem;
        }

        .product-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
          padding: 10px;
        }

        .card-title {
          font-size: 0.8rem; /* Un pelín más pequeña para que no se corte el texto */
          height: 2.8em; /* Ajustamos la altura para que los botones queden alineados */
        }

        .btn-wa,
        .btn-photos {
          padding: 8px 5px; /* Botones un poco más compactos */
          font-size: 0.7rem;
        }

        .card-title {
          font-size: 0.9rem;
        }
      }
    </style>

      function init() {
        categories.forEach((cat, i) => {
          const btn = document.createElement("button");
          btn.className = `cat-btn ${i === 0 ? "active" : ""}`;
          btn.dataset.target = cat.id;
          btn.innerText = cat.label; // Quitamos el strong del contador
          btn.onclick = () => switchCat(cat.id);
          sidebar.appendChild(btn);

          const section = document.createElement("section");
          section.className = `section ${i === 0 ? "visible" : ""}`;
          section.id = cat.id;
          section.innerHTML = `
                <div style="margin-bottom:2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                    <h2 style="font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 1px;">${cat.label}</h2>
                </div>
                <div class="product-grid"></div>`;

          const grid = section.querySelector(".product-grid");
          cat.products.forEach((p) => grid.appendChild(createCard(p)));
          document.getElementById("main").appendChild(section);
        });
      }

      function createCard(p) {
        const card = document.createElement("div");

          p.photos.length > 0
            ? p.photos[0]
            : "https://placehold.co/500x500/141618/6b7280?text=Proximamente";

        card.innerHTML = `
            <div class="card-img" onclick='openModal(${JSON.stringify(p.photos)})'>
                <img src="${mainImg}" loading="lazy">
                ${p.photos.length > 1 ? `<div class="photo-tag">📸 ${p.photos.length}</div>` : ""}
            </div>

            <div class="card-body">
                <div class="card-title">${p.name}</div>
                <div class="btn-group">
                    <a href="https://wa.me/${WHATSAPP_NUM}?text=Me interesa: ${p.name}" target="_blank" class="btn-wa">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                        </svg>
                        PEDIR WHATSAPP
                    </a>
                </div>
            </div>`;
        return card;
      }

      function switchCat(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("visible"));
        document
          .querySelectorAll(".cat-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(id).classList.add("visible");
        document.querySelector(`[data-target="${id}"]`).classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openModal(photos) {
        if (photos.length === 0) return;
        const modal = document.getElementById("photoModal");
        const gallery = document.getElementById("modalGallery");
        gallery.innerHTML = photos
          .map((src) => `<img src="${src}" class="modal-content">`)
          .join("");
        modal.style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("photoModal").style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Buscador
      document.getElementById("searchInput").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase().trim();
        const searchSection = document.getElementById("search-results");
        const grid = document.getElementById("grid-search-results");
        if (q.length > 0) {
          document
            .querySelectorAll(".section")
            .forEach((s) => s.classList.remove("visible"));
          document
            .querySelectorAll(".cat-btn")
            .forEach((b) => b.classList.remove("active"));
          searchSection.classList.add("visible");
          grid.innerHTML = "";
          categories.forEach((cat) =>
            cat.products.forEach((p) => {
              if (p.name.toLowerCase().includes(q))
                grid.appendChild(createCard(p));
            }),
          );
        } else {
          searchSection.classList.remove("visible");
          switchCat(categories[0].id);
        }
      });

      init();
    </script>
  </body>
</html>
